services:
  - type: web
    name: nataprep-backend
    runtime: python
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: bash start.sh
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: nataprep-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: REDIS_URL
        sync: false          # set manually from Upstash
      - key: OPENAI_API_KEY
        sync: false          # set manually
      - key: ALLOWED_ORIGINS
        sync: false          # set to your Vercel URL after deploy
      - key: CELERY_BROKER_URL
        sync: false          # same as REDIS_URL
      - key: CELERY_RESULT_BACKEND
        sync: false          # same as REDIS_URL (different db index)

databases:
  - name: nataprep-db
    plan: free
    region: singapore
    databaseName: nataprep
    user: nataprep
